replicaCount: 1

# Chart Service Configuration
chartService:
  replicaCount: 1
  image:
    repository: waveseer/chart-service
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

config: {}

api:
  image:
    repository: waveseer
    tag: local
  command:
    - "uvicorn"
    - "wave.api.app:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "9000"
  service:
    port: 9000

ingest:
  image:
    repository: waveseer
    tag: local
  command:
    - "uvicorn"
    - "wave.ingest:ws_app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
  service:
    port: 8000

ui:
  image:
    repository: waveseer
    tag: local
  command:
    - "python"
    - "-c"
    - "from wave.ui.app import run; run()"
  service:
    port: 8050

serviceMonitor:
  enabled: true

grafanaDashboard:
  enabled: true
