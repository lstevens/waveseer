apiVersion: v1
kind: Service
metadata:
  name: {{ include "waveseer.fullname" . }}-api
  labels:
    app: {{ include "waveseer.name" . }}
spec:
  type: {{ .Values.api.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
  selector:
    app: {{ include "waveseer.name" . }}
