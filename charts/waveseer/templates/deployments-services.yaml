{{- $name := include "waveseer.fullname" . -}}
{{- $base := include "waveseer.name" . -}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-api" $name }}
  labels:
    app.kubernetes.io/name: {{ $base }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $base }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $base }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          {{- if .Values.api.command }}
          command:
{{ toYaml .Values.api.command | indent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-api" $name }}
  labels:
    app.kubernetes.io/name: {{ $base }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ $base }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api

