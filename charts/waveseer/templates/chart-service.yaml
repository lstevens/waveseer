apiVersion: v1
kind: Service
metadata:
  name: {{ include "waveseer.fullname" . }}-chart
  labels:
    {{- include "waveseer.labels" . | nindent 4 }}
    app.kubernetes.io/component: chart-service
spec:
  type: {{ .Values.chartService.service.type }}
  ports:
    - port: {{ .Values.chartService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "waveseer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chart-service
