# Long Short-Term Memory (LSTM) Configuration
# This configuration is optimized for temporal pattern recognition

# Experiment information
name: lstm_pattern_detector
version: "0.1.0"
description: "Chart pattern detection using LSTM architecture"
tags:
  - lstm
  - pattern_detection
  - temporal_analysis
notes: "LSTM model optimized for capturing temporal dependencies in price patterns"

# Model configuration
model:
  model_type: "lstm"  # Use LSTM architecture
  
  # Feature dimensions
  input_size: 5      # OHLCV features
  num_classes: 10    # Number of pattern types to detect
  
  # Model architecture
  hidden_size: 128   # Size of LSTM cell hidden state
  num_layers: 2      # Two-layer stacked LSTM
  dropout: 0.3       # Dropout for regularization
  
  # LSTM-specific parameters
  bidirectional: true   # Use bidirectional LSTM for context in both directions
  attention: true       # Apply attention mechanism to focus on important parts of sequence

# Optimizer settings
optimizer:
  optimizer: "adam"
  learning_rate: 0.0005  # Lower learning rate for LSTM stability
  weight_decay: 0.0001   # L2 regularization
  beta1: 0.9
  beta2: 0.999
  
  # Learning rate scheduling
  lr_scheduler: "plateau"  # Reduce LR on plateau
  lr_gamma: 0.5            # Halve the learning rate when plateau is detected
  
  # Gradient clipping (important for LSTM training)
  clip_grad_norm: 0.5     # More aggressive clipping for LSTM

# Data configuration
data:
  # Dataset generation
  synthetic_data: true
  n_samples: 5000            # Generate 5000 synthetic samples
  sequence_length: 120       # Longer sequences for LSTM to capture temporal patterns
  
  # Patterns to detect
  pattern_types:
    - HEAD_AND_SHOULDERS
    - INVERSE_HEAD_AND_SHOULDERS
    - DOUBLE_TOP
    - DOUBLE_BOTTOM
    - TRIANGLE_ASCENDING
    - TRIANGLE_DESCENDING
    - TRIANGLE_SYMMETRICAL
    - CHANNEL_UP
    - CHANNEL_DOWN
    - FLAG
  
  # Data splitting
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true
  
  # Data loading
  batch_size: 32            # Smaller batch size for LSTM
  num_workers: 4
  shuffle: true
  
  # Data augmentation
  augmentation: true
  noise_level: 0.03         # Less noise for temporal patterns
  shift_prob: 0.5
  flip_prob: 0.3
  scale_prob: 0.5

# Training parameters
train:
  epochs: 80                # More epochs for LSTM to converge
  early_stopping: true
  patience: 10              # More patience for LSTM
  val_frequency: 1
  checkpoint_dir: "checkpoints/lstm"
  save_best: true
  save_last: true
  save_frequency: 5
  metrics:
    - accuracy
    - f1
    - precision
    - recall
  use_cuda: true
  seed: 42
  verbose: true
  progress_bar: true
