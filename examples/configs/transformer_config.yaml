# Transformer Model Configuration
# This configuration uses self-attention for capturing long-range dependencies in patterns

# Experiment information
name: transformer_pattern_detector
version: "0.1.0"
description: "Chart pattern detection using Transformer architecture"
tags:
  - transformer
  - attention
  - pattern_detection
  - self_attention
notes: "Transformer model with multi-head self-attention for capturing non-local relationships in price patterns"

# Model configuration
model:
  model_type: "transformer"  # Use Transformer architecture
  
  # Feature dimensions
  input_size: 5      # OHLCV features
  num_classes: 10    # Number of pattern types to detect
  
  # Model architecture
  hidden_size: 128   # Embedding dimension / model dimension
  num_layers: 3      # Number of transformer encoder layers
  dropout: 0.1       # Lower dropout typical for transformers
  
  # Transformer-specific parameters
  n_heads: 8         # Multi-head attention (heads=128/16=8)
  dim_feedforward: 512  # Size of the feedforward network in transformer

# Optimizer settings
optimizer:
  optimizer: "adam"
  learning_rate: 0.0001  # Lower learning rate for transformer
  weight_decay: 0.00005  # L2 regularization
  beta1: 0.9
  beta2: 0.98           # Slightly different beta2 for transformer (similar to original paper)
  eps: 1e-9             # Smaller epsilon for numerical stability
  
  # Learning rate scheduling
  lr_scheduler: "cosine"   # Cosine annealing with warmup is typical for transformers
  lr_min: 0.00001
  
  # Gradient clipping
  clip_grad_norm: 1.0

# Data configuration
data:
  # Dataset generation
  synthetic_data: true
  n_samples: 10000           # More data for transformer
  sequence_length: 150       # Longer sequences to leverage self-attention
  
  # Patterns to detect
  pattern_types:
    - HEAD_AND_SHOULDERS
    - INVERSE_HEAD_AND_SHOULDERS
    - DOUBLE_TOP
    - DOUBLE_BOTTOM
    - TRIANGLE_ASCENDING
    - TRIANGLE_DESCENDING
    - TRIANGLE_SYMMETRICAL
    - CHANNEL_UP
    - CHANNEL_DOWN
    - FLAG
  
  # Data splitting
  train_ratio: 0.75          # More training data
  val_ratio: 0.15
  test_ratio: 0.1
  stratify: true
  
  # Data loading
  batch_size: 32             # Smaller batches due to memory requirements
  num_workers: 4
  shuffle: true
  
  # Data augmentation
  augmentation: true
  noise_level: 0.03          # Less noise for transformer
  shift_prob: 0.5
  flip_prob: 0.3
  scale_prob: 0.5

# Training parameters
train:
  epochs: 100                # More epochs for transformer to converge
  early_stopping: true
  patience: 15               # More patience for transformer
  val_frequency: 1
  checkpoint_dir: "checkpoints/transformer"
  save_best: true
  save_last: true
  save_frequency: 5
  metrics:
    - accuracy
    - f1
    - precision
    - recall
  use_cuda: true
  seed: 42
  verbose: true
  progress_bar: true
